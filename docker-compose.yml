services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scoutpro
      POSTGRES_PASSWORD: scoutpro
      POSTGRES_DB: baseball_project
    # Host 5433 avoids clash with a local Postgres install on 5432
    ports:
      - "5433:5432"
    volumes:
      - scoutpro_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scoutpro -d baseball_project"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://scoutpro:scoutpro@postgres:5432/baseball_project
      REDIS_URL: redis://redis:6379/0
      SCOUTPRO_DEV_AUTH: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  scoutpro_pgdata:
