<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Baseball Projection Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="logo">BP</div>
        <div>
          <h1>Baseball Projection Dashboard</h1>
          <p>MiLB scraping + free MLB profile APIs</p>
        </div>
      </div>
      <a class="docs-link" href="/docs" target="_blank" rel="noreferrer">API Docs</a>
    </header>

    <main class="container">
      <section class="card">
        <h2>1) Search MLB Player</h2>
        <form id="search-form" class="form-row">
          <input id="search-name" type="text" placeholder="Enter player name (e.g. Mike Trout)" required />
          <button type="submit">Search</button>
        </form>
        <div id="search-status" class="status"></div>
        <div id="search-results" class="table-wrap"></div>
      </section>

      <section class="card">
        <h2>2) Player Profile & Career Stats</h2>
        <form id="player-form" class="form-row">
          <input id="player-id" type="number" placeholder="Enter MLB player ID" required />
          <button type="submit">Load Profile</button>
        </form>
        <div id="player-status" class="status"></div>
        <div id="player-profile" class="grid"></div>
        <div class="split-grid">
          <div>
            <h3>Career Hitting</h3>
            <div id="player-hitting" class="table-wrap"></div>
          </div>
          <div>
            <h3>Career Pitching</h3>
            <div id="player-pitching" class="table-wrap"></div>
          </div>
        </div>
      </section>

      <section class="card">
        <h2>3) MiLB Scrape (Baseball-Reference)</h2>
        <form id="scrape-form" class="form-stack">
          <input
            id="scrape-url"
            type="url"
            placeholder="https://www.baseball-reference.com/register/player.fcgi?id=..."
            required
          />
          <div class="form-row">
            <label for="scrape-delay">Delay (sec)</label>
            <input id="scrape-delay" type="number" min="0" max="10" step="0.1" value="2.0" />
            <label class="checkbox-row" for="scrape-tables">
              <input id="scrape-tables" type="checkbox" checked />
              Include tables
            </label>
            <button type="submit">Run Scrape</button>
          </div>
        </form>
        <div id="scrape-status" class="status"></div>
        <div id="scrape-summary" class="grid"></div>
        <div class="split-grid">
          <div>
            <h3>Batting Table</h3>
            <div id="scrape-batting" class="table-wrap"></div>
          </div>
          <div>
            <h3>Pitching Table</h3>
            <div id="scrape-pitching" class="table-wrap"></div>
          </div>
        </div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
